<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAO Aircraft & Airport Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <header>
                <div class="title-section">
                    <h1>ICAO Lookup</h1>
                    <p class="subtitle">Search aircraft and airports</p>
                </div>
                <div class="search-container">
                    <div class="search-row">
                        <input type="text" id="search-input" placeholder="Search aircraft or airports (e.g., B738, EGLL, LHR, London)..." autofocus>
                        <select id="filter-select" class="filter-dropdown">
                            <option value="all">All</option>
                            <option value="aircraft">Aircraft Only</option>
                            <option value="airports">Airports Only</option>
                        </select>
                    </div>
                    <div id="loader" class="loader"></div>
                </div>
            </header>

            <main>
                <div id="results-meta" class="results-info" style="display: none;">
                    <span id="results-count">Showing 0 matches</span>
                    <span id="loading-status"></span>
                </div>
                
                <div id="results-list" class="results-grid">
                    <!-- Results will be injected here -->
                </div>

                <div id="initial-state" class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <p>Start typing to search aircraft (e.g., Global 7500) or airports (e.g., LHR, London)...</p>
                </div>
            </main>
        </div>

        <aside class="readout-panel">
            <div class="readout-section">
                <div class="readout-label">DATABASE ENTRIES</div>
                <div class="readout-value" id="db-entries">--</div>
                <div class="readout-unit">RECORDS</div>
            </div>
            
            <div class="readout-section">
                <div class="readout-label">LAST SYNC</div>
                <div class="readout-value" id="last-sync">--</div>
                <div class="readout-unit">HOURS AGO</div>
            </div>
        </aside>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const filterSelect = document.getElementById('filter-select');
        const resultsList = document.getElementById('results-list');
        const resultsMeta = document.getElementById('results-meta');
        const resultsCount = document.getElementById('results-count');
        const initialState = document.getElementById('initial-state');
        const loader = document.getElementById('loader');
        const loadingStatus = document.getElementById('loading-status');
        const dbEntriesEl = document.getElementById('db-entries');
        const lastSyncEl = document.getElementById('last-sync');

        let aircraftData = [];
        let airportData = [];
        let lastSyncTime = new Date();
        let currentFilter = 'all';

        // Update readout panel stats
        function updateReadout() {
            const totalEntries = aircraftData.length + airportData.length;
            if (totalEntries > 0) {
                dbEntriesEl.textContent = totalEntries.toLocaleString();
            }
            const hoursSinceSync = Math.floor((new Date() - lastSyncTime) / (1000 * 60 * 60));
            lastSyncEl.textContent = hoursSinceSync < 1 ? '< 1' : hoursSinceSync.toString();
        }

        // Fetch data on load
        async function init() {
            loader.style.display = 'block';
            loadingStatus.textContent = 'Loading database...';
            resultsMeta.style.display = 'flex';

            try {
                const [aircraftResponse, airportsResponse] = await Promise.all([
                    fetch('icao_lookup.json'),
                    fetch('airports.json')
                ]);
                aircraftData = await aircraftResponse.json();
                airportData = await airportsResponse.json();
                loader.style.display = 'none';
                loadingStatus.textContent = 'Database ready';
                updateReadout();
                setInterval(updateReadout, 60000); // Update every minute
                setTimeout(() => {
                    if (!searchInput.value) {
                        resultsMeta.style.display = 'none';
                    }
                }, 2000);
            } catch (error) {
                console.error('Failed to load data:', error);
                loadingStatus.textContent = 'Error loading data';
                loadingStatus.style.color = '#ff5555';
                dbEntriesEl.textContent = 'ERROR';
                lastSyncEl.textContent = 'N/A';
            }
        }

        function renderAircraftCard(item) {
            const card = document.createElement('div');
            card.className = 'aircraft-card';

            const manufacturer = item.manufacturerName === "''" || item.manufacturerName === "unknow" ? "Unknown" : item.manufacturerName;
            const model = item.model === "''" || item.model === "unknow" ? "Unknown" : item.model;
            const typecode = item.typecode === "''" ? "N/A" : item.typecode;

            card.innerHTML = `
                <div class="info-group">
                    <span class="manufacturer">${manufacturer}</span>
                    <span class="model-name">${model}</span>
                </div>
                <div class="type-group">
                    <div class="type-code">${typecode}</div>
                    <button class="copy-btn" onclick="copyCode(this, '${typecode}')">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        Copy
                    </button>
                </div>
            `;
            return card;
        }

        function renderAirportCard(item) {
            const card = document.createElement('div');
            card.className = 'airport-card';

            const location = item.city && item.country ? `${item.city}, ${item.country}` : item.city || item.country || 'Unknown';

            card.innerHTML = `
                <div class="info-group">
                    <span class="airport-name">${item.name}</span>
                    <span class="airport-location">${location}</span>
                </div>
                <div class="code-group">
                    ${item.iata ? `
                        <div class="code-badge iata-badge">${item.iata}</div>
                        <button class="copy-btn" onclick="copyCode(this, '${item.iata}', 'IATA')">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            Copy IATA
                        </button>
                    ` : ''}
                    <div class="code-badge icao-badge">${item.icao}</div>
                    <button class="copy-btn" onclick="copyCode(this, '${item.icao}', 'ICAO')">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        Copy ICAO
                    </button>
                </div>
            `;
            return card;
        }

        function renderResults(aircraftMatches, airportMatches) {
            resultsList.innerHTML = '';

            const totalMatches = aircraftMatches.length + airportMatches.length;

            if (totalMatches === 0) {
                resultsList.innerHTML = `
                    <div class="empty-state">
                        <p>No matches found for "${searchInput.value}"</p>
                    </div>
                `;
                resultsCount.textContent = '0 matches';
                return;
            }

            const limit = 50;
            const displayAircraft = aircraftMatches.slice(0, limit);
            const displayAirports = airportMatches.slice(0, limit - displayAircraft.length);

            resultsCount.textContent = `Showing ${Math.min(totalMatches, limit)} of ${totalMatches} matches`;

            // Aircraft section
            if (displayAircraft.length > 0) {
                const aircraftHeader = document.createElement('div');
                aircraftHeader.className = 'section-header';
                aircraftHeader.textContent = `/// AIRCRAFT (${displayAircraft.length})`;
                resultsList.appendChild(aircraftHeader);

                displayAircraft.forEach(item => {
                    resultsList.appendChild(renderAircraftCard(item));
                });
            }

            // Airports section
            if (displayAirports.length > 0) {
                const airportHeader = document.createElement('div');
                airportHeader.className = 'section-header';
                airportHeader.textContent = `/// AIRPORTS (${displayAirports.length})`;
                resultsList.appendChild(airportHeader);

                displayAirports.forEach(item => {
                    resultsList.appendChild(renderAirportCard(item));
                });
            }
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();

            if (!query) {
                resultsList.innerHTML = '';
                resultsMeta.style.display = 'none';
                initialState.style.display = 'block';
                return;
            }

            initialState.style.display = 'none';
            resultsMeta.style.display = 'flex';

            let aircraftMatches = [];
            let airportMatches = [];

            // Search aircraft (if filter allows)
            if (currentFilter === 'all' || currentFilter === 'aircraft') {
                aircraftMatches = aircraftData.filter(item => {
                    const searchStr = `${item.manufacturerName} ${item.model} ${item.typecode}`.toLowerCase();
                    return searchStr.includes(query);
                });
            }

            // Search airports (if filter allows)
            if (currentFilter === 'all' || currentFilter === 'airports') {
                airportMatches = airportData.filter(item => {
                    const searchStr = `${item.name} ${item.city} ${item.country} ${item.iata} ${item.icao}`.toLowerCase();
                    return searchStr.includes(query);
                });
            }

            renderResults(aircraftMatches, airportMatches);
        }

        function handleFilterChange() {
            currentFilter = filterSelect.value;
            // Re-run search with new filter if there's a query
            if (searchInput.value.trim()) {
                handleSearch();
            }
        }

        async function copyCode(btn, code, codeType) {
            try {
                await navigator.clipboard.writeText(code);
                const originalText = btn.innerHTML;
                btn.innerHTML = codeType ? `Copied ${codeType}!` : 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        }

        searchInput.addEventListener('input', handleSearch);
        filterSelect.addEventListener('change', handleFilterChange);

        // Initialize
        init();
    </script>
</body>
</html>
